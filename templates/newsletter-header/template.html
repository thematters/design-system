<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="ds-template-size" content="600x200" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared/tokens.css" />
    <link rel="stylesheet" href="../shared/template-base.css" />
    <style>
      .tpl-canvas {
        width: 600px;
        height: 200px;
        padding: 28px 36px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: linear-gradient(
          135deg,
          var(--color-brand-new-purple) 0%,
          color-mix(in srgb, var(--color-brand-new-purple) 70%, var(--color-grey-black)) 100%
        );
        color: var(--color-grey-white);
        gap: 24px;
        position: relative;
        overflow: hidden;
      }

      /* Decorative lime corner accent */
      .tpl-canvas::after {
        content: "";
        position: absolute;
        right: -40px;
        bottom: -40px;
        width: 160px;
        height: 160px;
        border-radius: 999px;
        background: var(--color-brand-new-green);
        opacity: 0.85;
        z-index: 0;
      }

      .text {
        position: relative;
        z-index: 1;
        flex: 1 0 0;
        min-width: 0;
      }
      .eyebrow {
        font-size: 14px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--color-brand-new-green);
        margin: 0 0 4px;
      }
      .title {
        font-family: "Noto Serif TC", serif;
        font-size: 32px;
        line-height: 1.25;
        font-weight: 700;
        margin: 0;
        /* clamp 2 lines */
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .meta {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.75);
        margin-top: 8px;
      }
      .brand {
        position: relative;
        z-index: 1;
        font-size: 14px;
        opacity: 0.9;
      }
      .brand.tpl-brand-mark {
        color: var(--color-grey-white);
      }
    </style>
  </head>
  <body>
    <div class="tpl-canvas">
      <div class="text">
        <p class="eyebrow">{{eyebrow}}</p>
        <h1 class="title">{{title}}</h1>
        <p class="meta">{{issueDate}} · {{issueNumber}}</p>
      </div>
      <div class="tpl-brand-mark brand">Matters</div>
    </div>
  </body>
</html>
