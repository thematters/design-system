name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build / Lint / Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build tokens
        run: pnpm build:tokens

      - name: Verify tokens dist matches source
        # Tokens dist/ is committed; if `pnpm build:tokens` produces a diff,
        # someone forgot to regenerate. Fail loud.
        run: |
          if ! git diff --exit-code -- packages/tokens/dist tokens/dist; then
            echo "::error::tokens/dist or packages/tokens/dist is out of date. Run 'pnpm build:tokens' and commit." >&2
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build packages
        run: pnpm build:react

      - name: Build Storybook
        run: pnpm build:storybook
