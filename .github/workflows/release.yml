name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed so changesets can compute changelogs
          # against the previous version tags.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter './packages/*' build

      - name: Create Release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # `pnpm run version`  → bumps versions + writes CHANGELOG.md, opens PR
          # `pnpm run release`  → builds + `changeset publish` → npm + git tags
          # NOTE: must be `pnpm run …`. Bare `pnpm version` invokes the built-in
          # version subcommand (which silently dumps Node/npm versions and
          # never runs our script). `pnpm release` is fine because pnpm has
          # no built-in command of that name, but we keep `run` for symmetry.
          version: pnpm run version
          publish: pnpm run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
